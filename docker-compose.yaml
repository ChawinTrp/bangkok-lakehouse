# Local Airflow for development. Not a production topology — LocalExecutor on a
# single Postgres, deps installed at container start. Enough to run our DAG.
---
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # make the top-level `include` package importable from DAGs
    PYTHONPATH: /opt/airflow
    # our pipeline's runtime deps + the Docker provider (for DockerOperator), installed on first boot
    _PIP_ADDITIONAL_REQUIREMENTS: pandas pyarrow requests apache-airflow-providers-docker
    # where the lakehouse lands inside the container
    LAKEHOUSE_ROOT: /opt/airflow/data
    STORAGE_BACKEND: local
    TRAFFY_API_URL: https://publicapi.traffy.in.th/teamchadchart-stat-api/geojson/v1
    # host path of this repo — the silver DockerOperator binds it on the HOST daemon
    HOST_PROJECT_PATH: ${HOST_PROJECT_PATH}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    # Docker-out-of-Docker: let Airflow launch sibling containers (the spark job)
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # one-shot: create the metadata tables + an admin user, then exit.
  # behind a profile so plain `docker compose up` skips it — run it explicitly:
  #   docker compose --profile init up airflow-init
  airflow-init:
    <<: *airflow-common
    profiles: ["init"]
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && airflow users create --username airflow --password airflow
        --firstname admin --lastname admin --role Admin --email admin@example.com
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres-db:
